<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Douyin Stocks Knowledge Base Pipeline</title>
  <desc id="desc">A workflow from Douyin video materials to quant strategy hypotheses and backtest gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="52%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#243145"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#18b6a9"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8fb4c8"/>
    </marker>
    <style>
      .title { font: 700 38px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #b8c6d6; }
      .card-title { font: 700 20px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #f8fafc; }
      .card-body { font: 400 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #c7d2df; }
      .metric { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #ffffff; }
      .label { font: 400 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #a9bac9; }
    </style>
  </defs>

  <rect width="1200" height="430" rx="0" fill="url(#bg)"/>
  <path d="M0 348 C185 294 284 400 474 342 C632 294 717 240 892 288 C1038 328 1106 278 1200 238 L1200 430 L0 430 Z" fill="#0f766e" opacity="0.16"/>
  <path d="M0 370 C188 318 301 416 497 365 C675 318 751 276 916 314 C1056 348 1114 313 1200 286" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>

  <text x="60" y="70" class="title">抖音短线知识库：量化策略搜索版</text>
  <text x="60" y="104" class="subtitle">把视频盘感转译为变量、假设、反证问题和可执行的回测研究任务</text>

  <g transform="translate(60 145)" filter="url(#shadow)">
    <rect width="160" height="118" rx="14" fill="#111827" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <circle cx="34" cy="36" r="14" fill="#14b8a6"/>
    <text x="58" y="43" class="card-title">采集原文</text>
    <text x="22" y="75" class="card-body">问 AI 对白</text>
    <text x="22" y="96" class="card-body">作者作品流</text>
  </g>

  <g transform="translate(260 145)" filter="url(#shadow)">
    <rect width="160" height="118" rx="14" fill="#111827" stroke="#60a5fa" stroke-opacity="0.45"/>
    <circle cx="34" cy="36" r="14" fill="#3b82f6"/>
    <text x="58" y="43" class="card-title">清洗评分</text>
    <text x="22" y="75" class="card-body">去噪隔离</text>
    <text x="22" y="96" class="card-body">A/B/C/D 分级</text>
  </g>

  <g transform="translate(460 145)" filter="url(#shadow)">
    <rect width="160" height="118" rx="14" fill="#111827" stroke="#f59e0b" stroke-opacity="0.55"/>
    <circle cx="34" cy="36" r="14" fill="#f59e0b"/>
    <text x="58" y="43" class="card-title">变量映射</text>
    <text x="22" y="75" class="card-body">盘面话术</text>
    <text x="22" y="96" class="card-body">可观测字段</text>
  </g>

  <g transform="translate(660 145)" filter="url(#shadow)">
    <rect width="160" height="118" rx="14" fill="#111827" stroke="#a78bfa" stroke-opacity="0.55"/>
    <circle cx="34" cy="36" r="14" fill="#8b5cf6"/>
    <text x="58" y="43" class="card-title">策略假设</text>
    <text x="22" y="75" class="card-body">搜索任务</text>
    <text x="22" y="96" class="card-body">失效边界</text>
  </g>

  <g transform="translate(860 145)" filter="url(#shadow)">
    <rect width="160" height="118" rx="14" fill="#111827" stroke="#fb7185" stroke-opacity="0.55"/>
    <circle cx="34" cy="36" r="14" fill="#f43f5e"/>
    <text x="58" y="43" class="card-title">反证队列</text>
    <text x="22" y="75" class="card-body">样本外检查</text>
    <text x="22" y="96" class="card-body">成本与容量</text>
  </g>

  <g transform="translate(1040 145)" filter="url(#shadow)">
    <rect width="100" height="118" rx="14" fill="#111827" stroke="#22c55e" stroke-opacity="0.55"/>
    <circle cx="30" cy="36" r="14" fill="#22c55e"/>
    <text x="22" y="75" class="card-title">回测</text>
    <text x="22" y="97" class="card-title">门禁</text>
  </g>

  <line x1="224" y1="204" x2="252" y2="204" stroke="#8fb4c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="424" y1="204" x2="452" y2="204" stroke="#8fb4c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="624" y1="204" x2="652" y2="204" stroke="#8fb4c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="824" y1="204" x2="852" y2="204" stroke="#8fb4c8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1024" y1="204" x2="1032" y2="204" stroke="#8fb4c8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(60 318)">
    <text x="0" y="0" class="metric">1094</text>
    <text x="52" y="0" class="label">条问 AI 素材已评分</text>
    <text x="240" y="0" class="metric">14</text>
    <text x="275" y="0" class="label">个因子假设方向</text>
    <text x="470" y="0" class="metric">A/B</text>
    <text x="520" y="0" class="label">高价值素材优先提炼</text>
    <text x="760" y="0" class="metric">T+1</text>
    <text x="810" y="0" class="label">涨跌停、停牌、滑点和容量门禁</text>
  </g>
</svg>
